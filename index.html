<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>ERA RUSH</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div id="ui-layer">
    <div id="screen-start" class="screen">
        <h1>ERA RUSH</h1>
        <p style="letter-spacing: 5px; color: #888;">TIME WARP EDITION v3.0</p>
        <button class="btn" onclick="UI.show('screen-roster')">Enter Garage</button>
    </div>

    <div id="screen-roster" class="screen hidden">
        <h2>SELECT YOUR RACER</h2>
        <div class="grid-12" id="roster-grid"></div>
        <button class="btn" onclick="UI.goToGarage()">Confirm Racer</button>
    </div>

    <div id="screen-garage" class="screen hidden">
        <h2>VEHICLE PREVIEW</h2>
        <div id="garage-container"></div>
        <div style="display: flex; gap: 20px;">
            <button class="btn" onclick="UI.show('screen-roster')">Back</button>
            <button class="btn" onclick="UI.show('screen-track')">Next: Select Era</button>
        </div>
    </div>

    <div id="screen-track" class="screen hidden">
        <h2>SELECT CIRCUIT</h2>
        <div id="track-grid" style="display: flex; gap: 20px; margin: 30px; flex-wrap: wrap; justify-content: center; max-width: 800px;"></div>
        <button class="btn" onclick="Game.initRace()">START RACE</button>
    </div>

    <div id="countdown">3</div>
    <div id="hud">
        <div class="hud-box"><span>LAP</span><div id="val-lap">1 / 3</div></div>
        <div class="hud-box"><span>POS</span><div id="val-pos">1 / 12</div></div>
        <div class="hud-box"><span>SPEED</span><div id="val-speed">0</div></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script  src="./script.js"></script>

  </body>
  
</html>
